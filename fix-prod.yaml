apiVersion: apps/v1
kind: Deployment
metadata:
  name: production-deployment
  namespace: prod
  labels:
    app: production-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: production-app
  template:
    metadata:
      labels:
        app: production-app
    spec:
      containers:
      - name: hello-app
        image: us-east4-docker.pkg.dev/qwiklabs-gcp-02-0f000e0c6ad2/my-repository/hello-app:v1.0
        ports:
        - containerPort: 8080
